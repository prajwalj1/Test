<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prajwal Gautam | Projects</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="projects.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-container">
        <!-- Sidebar Component Placeholder -->
        <div id="sidebar-placeholder" style="display: contents;"></div>

        <!-- Main Content -->
        <main class="dashboard-content">
            <header class="content-header">
                <div class="header-left">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="project-search-input" placeholder="Search projects...">
                    </div>
                </div>
                <div class="user-profile">
                    <img src="/images/aa.jpeg" alt="Admin" onerror="this.src='https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80'">
                    <span>Prajwal Gautam</span>
                </div>
            </header>

            <div class="content-wrapper">
                <h1>Projects Management</h1>
                
                <!-- Add New Project Form -->
                <div class="admin-card">
                    <h2>Add New Project</h2>
                    <form id="add-project-form">
                        <div class="form-group">
                            <label for="project-title">Project Title</label>
                            <input type="text" id="project-title" required placeholder="e.g., E-commerce Website">
                        </div>
                        <div class="form-group">
                            <label for="project-category">Category</label>
                            <input type="text" id="project-category" required placeholder="e.g., Web Development">
                        </div>
                        <div class="form-group">
                            <label for="project-image">Image URL</label>
                            <input type="url" id="project-image" required placeholder="https://example.com/image.jpg">
                        </div>
                        <div class="form-group">
                            <label for="project-desc">Description</label>
                            <textarea id="project-desc" rows="4" required placeholder="Brief description of the project..."></textarea>
                        </div>
                        <button type="submit" class="btn-primary">Add Project</button>
                    </form>
                </div>

                <!-- Existing Projects List -->
                <div class="admin-card mt-4">
                    <h2>Existing Projects</h2>
                    <div class="table-responsive">
                        <table class="projects-table">
                            <thead>
                                <tr>
                                    <th>Image</th>
                                    <th>Title</th>
                                    <th>Category</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="admin-projects-list">
                                <!-- Projects will be injected here via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Load Sidebar Component -->
    <script src="components/sidebar.js"></script>
    <!-- Project Management Logic -->
    <script src="projects.js"></script>
</body>
</html>
